<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Date Confirmed ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Main Card -->
    <div class="confirmationCard">

        <h1>🎉 DATE CONFIRMED ❤️</h1>

        <h2>
            Congratulations My Love 🥺💕
        </h2>

        <!-- Summary -->
        <div class="summaryBox">

            <div class="summaryItem">
                <h3>📅 Date</h3>
                <p id="selectedDate"></p>
            </div>

            <div class="summaryItem">
                <h3>🕒 Time</h3>
                <p id="selectedTime"></p>
            </div>

            <div class="summaryItem">
                <h3>🍽️ Favorite Foods</h3>

                <div id="selectedFoods">

                </div>

            </div>

        </div>

        <!-- Romantic Message -->

        <div class="loveMessage">

            <br><p>❤️ Thank you for saying YES ❤️</p>

            <p>🥰 I'm already counting the days until our date.</p>

            <p>🌹 I promise we'll make unforgettable memories together.</p>

            <p>💖 You make me the happiest person alive.</p>

            <p>💕 Can't wait to see you!</p>

        </div>
        <br>

        <!-- Button -->

        <button id="finishBtn">

            💖 Plan Another Date 💖

        </button>

    </div>

    <!-- Script -->

    <script src="script.js"></script>

</body>

</html>
