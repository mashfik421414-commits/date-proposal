<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For My Beautiful ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Animated Background -->
    <div class="background"></div>

    <!-- Main Card -->
    <div class="card">

        <h1>Hello Beautiful 🌸</h1>

        <p class="question">
            Wanna go on a date with me?? 🥺❤️
        </p>

        <!-- YES Button -->
        <div class="buttons">
            <button id="yesBtn">
                Yes ❤️
            </button>
        </div>

    </div>

    <!-- Floating NO Button -->
    <div id="noContainer">

        <button id="noBtn">
            No 💔
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
